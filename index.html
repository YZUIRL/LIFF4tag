<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFF 資訊顯示</title>
    <!-- 引入 LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- 引入 Socket.IO 也就是對應你 Python 程式的 JS 版 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --primary-color: #00b900;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: var(--bg-gradient);
            color: #333;
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        h3 { margin-top: 0; color: #111; font-weight: 600; }
        .info-label { font-size: 0.75rem; color: #888; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.05em; }
        .info-value { font-weight: 500; color: var(--primary-color); word-break: break-all; margin-top: 4px; }
        #status { 
            margin-top: 20px;
            font-weight: 500; 
            font-size: 1.1rem;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h3 id="mainTitle">正在為您處理...</h3>
        <p id="status">讀取資訊中...</p>
        
        <div id="content" style="display:none;">
            <div class="info-label">目標機器人:</div>
            <div id="displayBot" class="info-value">未指定</div>

            <div class="info-label">您的 User ID:</div>
            <div id="displayId" class="info-value">讀取中...</div>
            
            <div class="info-label">欲設定標籤:</div>
            <div id="displayTag" class="info-value">未指定</div>
        </div>
    </div>

    <script>
        async function main() {
            try {
                // 1. 初始化 (請換成你的 LIFF ID)
                await liff.init({ liffId: "2009851813-AgTeSa4r" });

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    // 2. 取得 User ID
                    const profile = await liff.getProfile();
                    document.getElementById('displayId').textContent = profile.userId;

                    // 3. 取得網址上的參數
                    const urlParams = new URLSearchParams(window.location.search);
                    const botName = urlParams.get('bot'); 
                    const tagName = urlParams.get('tag');
                    const port = urlParams.get('port'); // 用於本地端測試
                    const redirectUrl = urlParams.get('redirect'); // 用於跳轉網頁

                    if (botName) document.getElementById('displayBot').textContent = botName;
                    if (tagName) document.getElementById('displayTag').textContent = tagName;

                    // 4. 執行 Socket.IO 連線與發送
                    if (botName && tagName) {
                        let hostUrl = `https://${botName}.herokuapp.com`;
                        if (port) {
                            hostUrl = `https://irl-svr.ee.yzu.edu.tw:${port}`;
                        }

                        document.getElementById('status').textContent = `正在同步標籤...`;
                        document.getElementById('status').style.color = "black";

                        const socket = io(`${hostUrl}/websoc`, {
                            transports: ['websocket', 'polling'],
                            timeout: 2000 // 設定 Socket.IO 的內建連線超時
                        });

                        // 增加 timeout 保護，避免無限等待 (縮短至 2 秒)
                        const fallbackTimeout = setTimeout(() => {
                            if (redirectUrl) {
                                window.location.href = redirectUrl;
                            } else {
                                document.getElementById('status').textContent = `連線逾時，正在關閉...`;
                                liff.closeWindow();
                            }
                        }, 2000);

                        socket.on('connect', () => {
                            clearTimeout(fallbackTimeout);
                            const payload = {
                                type: 'Sensor',
                                message: `set_tag|${tagName}`,
                                user: profile.userId,
                                api_index: 0,
                                delay: 0
                            };
                            
                            socket.emit(`websoc_message`, payload);
                            
                            document.getElementById('status').textContent = `標籤同步完成，即將跳轉...`;
                            document.getElementById('status').style.color = "#00b900";
                            
                            // 縮短緩衝時間至 100 毫秒
                            setTimeout(() => {
                                if (redirectUrl) {
                                    window.location.href = redirectUrl;
                                } else {
                                    liff.closeWindow();
                                }
                            }, 100);
                        });

                        socket.on('connect_error', (error) => {
                            clearTimeout(fallbackTimeout);
                            document.getElementById('status').textContent = `處理中 (跳轉稍候)...`;
                            document.getElementById('status').style.color = "gray";
                            
                            // 即便是錯誤也縮短至 500 毫秒跳轉，避免使用者等待
                            if (redirectUrl) {
                                setTimeout(() => {
                                    window.location.href = redirectUrl;
                                }, 500);
                            } else {
                                document.getElementById('status').textContent = `連線錯誤: ${error.message}`;
                                document.getElementById('status').style.color = "red";
                            }
                        });
                    } else {
                        // 若無參數則直接嘗試跳轉或顯示錯誤
                        if (redirectUrl) {
                            window.location.href = redirectUrl;
                        } else if (!tagName) {
                            document.getElementById('status').textContent = "未指定標籤參數 (?tag=...)";
                            document.getElementById('status').style.color = "red";
                        }
                    }
                }
            } catch (error) {
                document.getElementById('status').textContent = "錯誤: " + error;
            }
        }
        main();
    </script>
</body>
</html>
