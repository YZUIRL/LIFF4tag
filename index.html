<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFF 資訊顯示</title>
    <!-- 引入 LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-color: #00b900;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: var(--bg-gradient);
        }
        .loader-container {
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <!-- 移除所有文字，讓使用者感受不到中繼站的存在 -->
    </div>

    <script>
        async function main() {
            try {
                // 1. 初始化
                await liff.init({ liffId: "2009851813-AgTeSa4r" });

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    // 2. 取得 User ID
                    const profile = await liff.getProfile();

                    // 3. 取得網址參數
                    const urlParams = new URLSearchParams(window.location.search);
                    const botName = urlParams.get('bot'); 
                    const tagName = urlParams.get('tag');
                    const port = urlParams.get('port');
                    const redirectUrl = urlParams.get('redirect');

                    // 4. 同步標籤 (Fetch POST)
                    if (botName && tagName) {
                        let hostUrl = `https://${botName}.herokuapp.com`;
                        if (port) hostUrl = `https://irl-svr.ee.yzu.edu.tw:${port}`;
                        if (botName === 'superpages' || botName.startsWith('yzu')) {
                            hostUrl = 'https://irl-svr.ee.yzu.edu.tw:5013';
                        }

                        // 建立一個通用跳轉函式，確保只觸發一次
                        let hasRedirected = false;
                        const doRedirect = (delay = 0) => {
                            if (hasRedirected) return;
                            hasRedirected = true;
                            
                            setTimeout(() => {
                                if (redirectUrl) {
                                    window.location.href = redirectUrl;
                                } else {
                                    liff.closeWindow();
                                }
                            }, delay);
                        };

                        // 1.5 秒安全保護，確保必定跳轉
                        const fallbackTimeout = setTimeout(() => {
                            doRedirect(0);
                        }, 1500);

                        try {
                            fetch(`${hostUrl}/api/trigger`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    type: 'Sensor',
                                    message: `set_tag|${tagName}`,
                                    user: profile.userId,
                                    api_index: 0
                                })
                            }).then(() => {
                                clearTimeout(fallbackTimeout);
                                doRedirect(50);
                            }).catch(() => {
                                clearTimeout(fallbackTimeout);
                                doRedirect(0);
                            });
                        } catch (e) {
                            clearTimeout(fallbackTimeout);
                            doRedirect(0);
                        }
                    } else {
                        // 若缺少參數，直接跳轉或關閉
                        if (redirectUrl) {
                            window.location.href = redirectUrl;
                        } else {
                            liff.closeWindow();
                        }
                    }
                }
            } catch (error) {
                // 發生全域錯誤時，若有跳轉網址則導向，否則關閉
                const urlParams = new URLSearchParams(window.location.search);
                const redirectUrl = urlParams.get('redirect');
                if (redirectUrl) {
                    window.location.href = redirectUrl;
                } else {
                    console.error(error);
                }
            }
        }
        main();
    </script>
</body>
</html>
